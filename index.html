<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heromi - Trang học liệu miễn phí</title>
    <link rel="icon" type="image/x-icon" href="/assets/heromi.ico">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Basic responsive styles that should be moved to style.css */
        .sidebar {
            transition: transform 0.3s ease;
        }
        .sidebar-open {
            transform: translateX(0);
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                z-index: 1000;
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar Toggle Button -->
    <button id="sidebarToggleBtn" class="sidebar-toggle-btn" aria-label="Mở menu">&#9776;</button>
    
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <div class="sidebar-logo">
                    <img src="/assets/logo.png" alt="Heromi">
                </div>
                <span class="sidebar-title">Heromi</span>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li class="nav-item active" data-section="bai-tap">
                <span class="nav-label" data-i18n="sidebar_baitap">Bài tập</span>
            </li>
            <li class="nav-item" data-section="de-thi">
                <span class="nav-label" data-i18n="sidebar_dethi">Đề thi</span>
            </li>
            <li class="nav-item" data-section="quan-ly-hoc-sinh">
                <span class="nav-label" data-i18n="sidebar_qlhs">Quản lý học sinh</span>
            </li>
            <li class="nav-item" data-section="ngan-hang-cau-hoi">
                <span class="nav-label" data-i18n="sidebar_nganhang">Ngân hàng câu hỏi</span>
            </li>
            <li class="nav-item" data-section="de-xuat-tinh-nang">
                <span class="nav-label" data-i18n="sidebar_dexuat">Đề xuất tính năng</span>
            </li>
            <li class="nav-item" data-section="setting">
                <span class="nav-label" data-i18n="sidebar_setting">Cài đặt</span>
            </li>
        </ul>
    </nav>
    
    <!-- Main Content -->
    <main class="main-content">
        <section id="dashboard" class="page-section">
            <div class="container">
                <!-- Header -->
                <header class="header">
                    <div class="header-left">
                        <h1 id="mainTitle" data-i18n="dashboard_title">Trang chủ</h1>
                        <form class="search-bar" onsubmit="return handleSearch(event)">
                            <input type="text" id="dashboardSearch" placeholder="Tìm kiếm..." autocomplete="off">
                            <button type="submit">🔍</button>
                        </form>
                    </div>
                    <div class="header-right">
                        <a href="#" class="btn btn-primary" id="loginBtn">Đăng nhập</a>
                        <a href="#" class="btn btn-secondary" id="registerBtn">Đăng ký</a>
                        <div class="user-profile" id="userProfile">
                            <div class="user-avatar" id="userAvatar">H</div>
                            <div class="user-info">
                                <div class="user-fullname" id="userFullname"></div>
                                <div class="user-history" id="userHistory"></div>
                            </div>
                            <button onclick="logoutUser()" class="btn btn-secondary">Đăng xuất</button>
                        </div>
                    </div>
                </header>
                
                <!-- Dashboard Grid -->
                <div class="dashboard-grid" id="dashboardGrid">
                    <!-- Cards will be generated here -->
                </div>
                
                <!-- Section Contents -->
                <div class="section-content" id="section-bai-tap">
                    <button class="btn btn-secondary back-home-btn">← Trở về trang chủ</button>
                    <h2>Bài tập</h2>
                    <div id="baitapUploadArea"></div>
                </div>
                
                <!-- Other section contents similarly structured -->
            </div>
        </section>
    </main>
    
    <!-- Auth Popups -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup" id="loginPopup">
            <!-- Login form structure -->
        </div>
        <div class="popup" id="registerPopup">
            <!-- Register form structure -->
        </div>
    </div>
    
    <!-- Firebase and other scripts -->
    <script src="main.js"></script>
    <script src="auth.js"></script>
    <script src="navigation.js"></script>
    <script type="module">
        // Firebase initialization and auth functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBN6H7g8MlpaabYFu88miVqigqyRDNhcx8",
            authDomain: "heromi-77650.firebaseapp.com",
            projectId: "heromi-77650",
            storageBucket: "heromi-77650.appspot.com",
            messagingSenderId: "80819533386",
            appId: "1:80819533386:web:102d1a45ae711fb49358b3",
            measurementId: "G-YMEPRBQ164"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Make available globally
        window.auth = auth;
        window.db = db;
    </script>
    <script>
        // Main application script
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize UI components
            initSidebar();
            initNavigation();
            initAuth();
            initDashboard();
            
            // Check auth state
            checkAuthState();
        });
        
        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const toggleBtn = document.getElementById('sidebarToggleBtn');
            
            function toggleSidebar() {
                sidebar.classList.toggle('sidebar-open');
                overlay.classList.toggle('active');
            }
            
            toggleBtn.addEventListener('click', toggleSidebar);
            overlay.addEventListener('click', toggleSidebar);
            
            // Close sidebar when menu item is clicked on mobile
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    if (window.innerWidth <= 768) {
                        toggleSidebar();
                    }
                });
            });
        }
        
        function initNavigation() {
            // Navigation between sections
            function navigateTo(sectionId) {
                // Hide all sections
                document.querySelectorAll('.section-content').forEach(section => {
                    section.style.display = 'none';
                });
                
                // Show selected section
                if (sectionId) {
                    const section = document.getElementById(`section-${sectionId}`);
                    if (section) section.style.display = 'block';
                }
                
                // Toggle dashboard grid visibility
                document.getElementById('dashboardGrid').style.display = sectionId ? 'none' : 'grid';
                
                // Update active state in sidebar
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.section === sectionId);
                });
            }
            
            // Back to home buttons
            document.querySelectorAll('.back-home-btn').forEach(btn => {
                btn.addEventListener('click', () => navigateTo(''));
            });
            
            // Sidebar navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    navigateTo(this.dataset.section);
                });
            });
            
            // Card navigation
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (!e.target.closest('button, input')) {
                        navigateTo(this.dataset.section);
                    }
                });
            });
        }
        
        function initAuth() {
            // Auth related initialization
            document.getElementById('loginBtn').addEventListener('click', function(e) {
                e.preventDefault();
                showAuthPopup('login');
            });
            
            document.getElementById('registerBtn').addEventListener('click', function(e) {
                e.preventDefault();
                showAuthPopup('register');
            });
        }
        
        function checkAuthState() {
            // Check if user is logged in and update UI
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // User is signed in
                    showUserProfile(user);
                } else {
                    // User is signed out
                    hideUserProfile();
                }
            });
        }
        
        // Other application functions...
    </script>
</body>
</html>
